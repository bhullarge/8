<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> gਆਟੋ ਵਾਕੀ-ਟਾਕੀ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 30px; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .btn-start { background: #22c55e; color: white; padding: 20px; border: none; border-radius: 15px; font-size: 18px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .controls { display: none; justify-content: space-around; margin-top: 25px; }
        .round-btn { width: 85px; height: 85px; border-radius: 50%; border: none; cursor: pointer; font-size: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .on { background: #22c55e; color: white; box-shadow: 0 0 15px #22c55e; }
        .off { background: #ef4444; color: white; }
        .label { font-size: 11px; margin-top: 5px; font-weight: bold; }
        #status { color: #94a3b8; font-size: 13px; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-ui">
        <h2>🎙️ ਲਾਈਵ ਵਾਕੀ-ਟਾਕੀ</h2>
        <p style="color: #94a3b8; font-size: 14px;">ਸਕ੍ਰੀਨ 'ਤੇ ਕਲਿੱਕ ਕਰਕੇ ਸ਼ੁਰੂ ਕਰੋ</p>
        <button class="btn-start" onclick="connectNow()">ਸ਼ੁਰੂ ਕਰੋ</button>
    </div>

    <div id="main-ui" class="controls">
        <button id="micBtn" class="round-btn on" onclick="toggleMic()">
            <span>🎙️</span>
            <span class="label">ਮਾਈਕ ON</span>
        </button>
        <button id="spkBtn" class="round-btn off" onclick="toggleSpeaker()">
            <span>🔈</span>
            <span class="label">ਸਪੀਕਰ OFF</span>
        </button>
    </div>
    <div id="status">ਸਿਸਟਮ ਤਿਆਰ ਹੈ...</div>
</div>

<script>
    // Firebase Configuration (ਮੁਫ਼ਤ ਟੈਸਟਿੰਗ ਲਈ)
    const firebaseConfig = {
        databaseURL: "https://walkie-talkie-test-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("online_users");

    let peer = new Peer();
    let myStream;
    let micActive = true;
    let spkActive = false;

    // 1. ਮਾਈਕ੍ਰੋਫੋਨ ਅਤੇ ਕਨੈਕਸ਼ਨ ਸ਼ੁਰੂ ਕਰਨਾ
    async function connectNow() {
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });

            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('status').innerText = "ਦੋਸਤਾਂ ਨੂੰ ਲੱਭ ਰਿਹਾ ਹਾਂ...";

            // ਦੂਜੇ ਯੂਜ਼ਰਾਂ ਨੂੰ ਲੱਭੋ ਅਤੇ ਉਹਨਾਂ ਨੂੰ ਕਾਲ ਕਰੋ
            db.once('value', (snapshot) => {
                snapshot.forEach((child) => {
                    if (child.val() !== peer.id) {
                        peer.call(child.val(), myStream).on('stream', playStream);
                    }
                });
            });

            // ਆਪਣੀ ID ਡੇਟਾਬੇਸ ਵਿੱਚ ਪਾਓ ਤਾਂ ਜੋ ਦੂਜੇ ਤੁਹਾਨੂੰ ਲੱਭ ਸਕਣ
            db.push(peer.id);
            // ਜਦੋਂ ਤੁਸੀਂ ਪੇਜ ਬੰਦ ਕਰੋ ਤਾਂ ID ਹਟਾ ਦਿਓ
            db.onDisconnect().remove();

        } catch (err) {
            alert("ਮਾਈਕ ਦੀ ਇਜਾਜ਼ਤ ਦਿਓ!");
        }
    }

    // ਜਦੋਂ ਕੋਈ ਤੁਹਾਨੂੰ ਕਾਲ ਕਰੇ
    peer.on('call', (call) => {
        call.answer(myStream);
        call.on('stream', playStream);
    });

    function playStream(stream) {
        let audio = document.getElementById("remoteAudio");
        if (!audio) {
            audio = document.createElement('audio');
            audio.id = "remoteAudio";
            document.body.appendChild(audio);
        }
        audio.srcObject = stream;
        audio.autoplay = true;
        audio.muted = !spkActive;
        document.getElementById('status').innerText = "ਕਨੈਕਟ ਹੋ ਗਏ ਹੋ!";
    }

    function toggleMic() {
        micActive = !micActive;
        myStream.getAudioTracks()[0].enabled = micActive;
        const btn = document.getElementById('micBtn');
        btn.className = micActive ? 'round-btn on' : 'round-btn off';
        btn.querySelector('span').innerText = micActive ? '🎙️' : '🔇';
        btn.querySelector('.label').innerText = micActive ? 'ਮਾਈਕ ON' : 'ਮਾਈਕ OFF';
    }

    function toggleSpeaker() {
        spkActive = !spkActive;
        const audio = document.getElementById("remoteAudio");
        if (audio) audio.muted = !spkActive;
        const btn = document.getElementById('spkBtn');
        btn.className = spkActive ? 'round-btn on' : 'round-btn off';
        btn.querySelector('span').innerText = spkActive ? '🔊' : '🔈';
        btn.querySelector('.label').innerText = spkActive ? 'ਸਪੀਕਰ ON' : 'ਸਪੀਕਰ OFF';
    }
</script>
</body>
</html>
